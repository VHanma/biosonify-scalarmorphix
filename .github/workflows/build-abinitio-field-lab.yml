name: Build Launch-Tested BioSonify Ab Initio APK

on:
  pull_request:
    branches: [main]
    paths:
      - build_inputs/abinitio-overlay.b64.part*
      - .github/workflows/build-abinitio-field-lab.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    env:
      CI: '1'
      EXPO_NO_TELEMETRY: '1'
      NODE_OPTIONS: '--max-old-space-size=6144'
      APP_PACKAGE: com.vhanma.biosonify.abinitiofieldlab
      MAIN_COMPONENT: com.vhanma.biosonify.abinitiofieldlab/.MainActivity
      APK_FILE: BioSonify-AbInitio-SideBySide-OneClick.apk
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

    steps:
      - uses: actions/checkout@v4

      - name: Expand checksum-locked clone source
        shell: bash
        run: |
          set -euo pipefail
          cat build_inputs/abinitio-overlay.b64.part* > abinitio-overlay.b64
          base64 -d abinitio-overlay.b64 > abinitio-overlay.zip
          echo '794620752fec376169d51aa2eac7e6fc93de3f4818db251f14017a2df7efa2c1  abinitio-overlay.zip' | sha256sum -c -
          unzip -o abinitio-overlay.zip
          test -f 'app/(tabs)/field-lab.tsx'
          test -f lib/abinitio-field-engine.ts
          test -f scripts/smoke-abinitio.ts

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: pnpm/action-setup@v4
        with:
          version: '9.12.0'
          run_install: false
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install aligned Expo SDK 54 dependencies
        shell: bash
        run: |
          set -o pipefail
          pnpm install --no-frozen-lockfile 2>&1 | tee pnpm-install.log
          test ${PIPESTATUS[0]} -eq 0
          pnpm exec expo install --fix 2>&1 | tee expo-install-fix.log
          test ${PIPESTATUS[0]} -eq 0
          pnpm install --no-frozen-lockfile 2>&1 | tee -a pnpm-install.log
          test ${PIPESTATUS[0]} -eq 0
          pnpm exec expo install --check 2>&1 | tee expo-dependency-check.txt || true
          cp package.json resolved-package.json

      - name: Prove all seven field generators
        shell: bash
        run: |
          set -o pipefail
          pnpm exec tsx scripts/smoke-abinitio.ts 2>&1 | tee abinitio-engine-smoke.txt
          test ${PIPESTATUS[0]} -eq 0
          test "$(grep -c 'valid=true' abinitio-engine-smoke.txt)" -eq 7

      - name: Generate and build Android release
        shell: bash
        run: |
          set -o pipefail
          pnpm exec expo prebuild --platform android --clean 2>&1 | tee prebuild.log
          test ${PIPESTATUS[0]} -eq 0
          grep -R "applicationId.*${APP_PACKAGE}" android/app/build.gradle
          grep '^reactNativeArchitectures=' android/gradle.properties | tee architecture-check.txt
          grep 'arm64-v8a' architecture-check.txt
          grep 'x86_64' architecture-check.txt
          chmod +x android/gradlew
          (cd android && ./gradlew :app:assembleRelease --no-daemon --stacktrace) 2>&1 | tee release-build.log
          test ${PIPESTATUS[0]} -eq 0

      - name: Verify package, label, signature and ABIs
        shell: bash
        run: |
          set -euo pipefail
          cp android/app/build/outputs/apk/release/app-release.apk "$APK_FILE"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -1)"
          AAPT="$(find "$ANDROID_HOME/build-tools" -name aapt -type f | sort -V | tail -1)"
          "$APKSIGNER" verify --verbose --print-certs "$APK_FILE" | tee apk-signature.txt
          "$AAPT" dump badging "$APK_FILE" | tee apk-badging.txt
          unzip -l "$APK_FILE" | tee apk-files.txt
          grep "package: name='${APP_PACKAGE}'" apk-badging.txt
          grep "application-label:'BioSonify Ab Initio'" apk-badging.txt
          grep 'lib/arm64-v8a/' apk-files.txt
          grep 'lib/x86_64/' apk-files.txt
          sha256sum "$APK_FILE" > BioSonify-AbInitio-SideBySide-OneClick-SHA256.txt

      - name: Boot Android 14 emulator
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$ANDROID_HOME/platform-tools:$ANDROID_HOME/emulator:$ANDROID_HOME/cmdline-tools/latest/bin:$PATH"
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "emulator" "system-images;android-34;google_apis;x86_64"
          sudo chmod 666 /dev/kvm
          echo no | avdmanager create avd --force --name abinitio_test --package "system-images;android-34;google_apis;x86_64" --device "pixel_6"
          emulator -avd abinitio_test -no-window -noaudio -no-boot-anim -no-snapshot -gpu swiftshader_indirect -camera-back none -camera-front none -memory 3072 > emulator-console.log 2>&1 &
          adb wait-for-device
          for i in $(seq 1 120); do
            [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" = "1" ] && break
            sleep 5
          done
          test "$(adb shell getprop sys.boot_completed | tr -d '\r')" = "1"
          adb shell input keyevent 82 || true

      - name: Install, launch and test every tab
        shell: bash
        run: |
          export PATH="$ANDROID_HOME/platform-tools:$PATH"
          set +e
          adb install -r "$APK_FILE" > install-result.txt 2>&1; INSTALL_CODE=$?
          adb shell am force-stop "$APP_PACKAGE"
          adb logcat -c
          adb shell am start -W -S -n "$MAIN_COMPONENT" > activity-start-result.txt 2>&1; START_CODE=$?
          sleep 20
          adb shell pidof "$APP_PACKAGE" > process-id.txt 2>&1
          adb shell dumpsys activity activities > activity-state.txt 2>&1
          adb logcat -d -v threadtime > launch-log.txt 2>&1
          adb exec-out screencap -p > launch-screen.png 2>/dev/null
          FAILED=0
          [ "$INSTALL_CODE" -eq 0 ] || FAILED=1
          [ "$START_CODE" -eq 0 ] || FAILED=1
          [ -s process-id.txt ] || FAILED=1
          grep -E "mResumedActivity|topResumedActivity" activity-state.txt | grep "$APP_PACKAGE" || FAILED=1
          grep -E "FATAL EXCEPTION|Unable to start activity|Process: ${APP_PACKAGE}|ReactNativeJS:.*(TypeError|ReferenceError|Invariant Violation|Error:)" launch-log.txt && FAILED=1
          [ "$FAILED" -eq 0 ] || exit 1
          set -euo pipefail
          SIZE="$(adb shell wm size | tail -1 | grep -oE '[0-9]+x[0-9]+')"; WIDTH="${SIZE%x*}"; HEIGHT="${SIZE#*x}"; Y=$((HEIGHT - 120))
          for PERCENT in 10 30 50 70 90 70; do
            adb shell input tap "$((WIDTH * PERCENT / 100))" "$Y"
            sleep 4
            test -n "$(adb shell pidof "$APP_PACKAGE" | tr -d '\r')"
          done
          adb shell dumpsys activity activities > navigation-activity-state.txt 2>&1
          adb logcat -d -v threadtime > navigation-log.txt 2>&1
          adb exec-out screencap -p > field-lab-screen.png 2>/dev/null
          grep -E "mResumedActivity|topResumedActivity" navigation-activity-state.txt | grep "$APP_PACKAGE"
          ! grep -E "FATAL EXCEPTION|Unable to start activity|Process: ${APP_PACKAGE}|ReactNativeJS:.*(TypeError|ReferenceError|Invariant Violation|Error:)" navigation-log.txt

      - name: Upload proven APK
        uses: actions/upload-artifact@v4
        with:
          name: BioSonify-AbInitio-SideBySide-WORKING
          path: |
            BioSonify-AbInitio-SideBySide-OneClick.apk
            BioSonify-AbInitio-SideBySide-OneClick-SHA256.txt
            apk-badging.txt
            apk-signature.txt
            apk-files.txt
            architecture-check.txt
            resolved-package.json
            abinitio-engine-smoke.txt
            release-build.log
            launch-log.txt
            navigation-log.txt
            launch-screen.png
            field-lab-screen.png
            activity-start-result.txt
            activity-state.txt
            navigation-activity-state.txt
            process-id.txt
          if-no-files-found: error
          retention-days: 30

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: BioSonify-AbInitio-Build-Test-Diagnostics
          path: |
            pnpm-install.log
            expo-install-fix.log
            expo-dependency-check.txt
            abinitio-engine-smoke.txt
            prebuild.log
            release-build.log
            emulator-console.log
            install-result.txt
            activity-start-result.txt
            activity-state.txt
            navigation-activity-state.txt
            launch-log.txt
            navigation-log.txt
            launch-screen.png
            field-lab-screen.png
            process-id.txt
          if-no-files-found: ignore
          retention-days: 7
