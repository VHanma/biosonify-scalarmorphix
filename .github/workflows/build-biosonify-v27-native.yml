name: Smoke-Test Preserved BioSonify Scalar APK

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/build-biosonify-v27-native.yml
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  smoke-test-preserved-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 35
    env:
      APP_PACKAGE: com.vhanma.biosonify.scalarparallax
      CANDIDATE_RUN_ID: '30052907225'

    steps:
      - name: Download preserved verified APK
        uses: actions/download-artifact@v4
        with:
          name: BioSonify-Scalar-Candidate
          path: candidate
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: VHanma/biosonify-scalarmorphix
          run-id: 30052907225

      - name: Confirm candidate files
        run: |
          ls -lah candidate
          test -f candidate/BioSonify-Scalar-SideBySide-OneClick.apk
          test -f candidate/BioSonify-Scalar-SideBySide-OneClick-SHA256.txt
          cd candidate
          sha256sum -c BioSonify-Scalar-SideBySide-OneClick-SHA256.txt

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Boot Android and test exact preserved APK
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          cores: 2
          ram-size: 4096M
          heap-size: 1024M
          disk-size: 6G
          disable-animations: true
          emulator-boot-timeout: 600
          script: |
            set -euo pipefail
            APK="candidate/BioSonify-Scalar-SideBySide-OneClick.apk"
            adb install -r "$APK"
            adb logcat -c
            adb shell monkey -p "$APP_PACKAGE" -c android.intent.category.LAUNCHER 1
            sleep 15
            PID="$(adb shell pidof "$APP_PACKAGE" | tr -d '\r')"
            test -n "$PID"
            adb shell dumpsys activity activities | grep -E "mResumedActivity|topResumedActivity" | grep "$APP_PACKAGE"

            python3 - <<'PY'
            import re
            import subprocess
            import time
            import xml.etree.ElementTree as ET

            package = "com.vhanma.biosonify.scalarparallax"
            labels = ["Frequencies", "Brain", "Theory", "Sonify"]

            for label in labels:
                subprocess.run(["adb", "shell", "uiautomator", "dump", "/sdcard/window.xml"], check=True, stdout=subprocess.DEVNULL)
                subprocess.run(["adb", "pull", "/sdcard/window.xml", "window.xml"], check=True, stdout=subprocess.DEVNULL)
                root = ET.parse("window.xml").getroot()
                node = next((n for n in root.iter() if n.attrib.get("text") == label or n.attrib.get("content-desc") == label), None)
                if node is None:
                    raise SystemExit(f"Could not find tab: {label}")
                match = re.fullmatch(r"\[(\d+),(\d+)\]\[(\d+),(\d+)\]", node.attrib["bounds"])
                if not match:
                    raise SystemExit(f"Bad bounds for {label}: {node.attrib.get('bounds')}")
                x1, y1, x2, y2 = map(int, match.groups())
                subprocess.run(["adb", "shell", "input", "tap", str((x1 + x2) // 2), str((y1 + y2) // 2)], check=True)
                time.sleep(3)
                pid = subprocess.check_output(["adb", "shell", "pidof", package], text=True).strip()
                if not pid:
                    raise SystemExit(f"App process died after opening {label}")
                print(f"Tab passed: {label}; process {pid}")
            PY

            adb logcat -d -v threadtime > biosonify-scalar-emulator-log.txt
            if grep -E "FATAL EXCEPTION|Unable to start activity|Process: ${APP_PACKAGE}" biosonify-scalar-emulator-log.txt; then
              echo "Fatal Android runtime error detected"
              exit 1
            fi
            if grep -E "ReactNativeJS:.*(TypeError|ReferenceError|Invariant Violation|Error:)" biosonify-scalar-emulator-log.txt; then
              echo "Fatal React Native JavaScript error detected"
              exit 1
            fi
            echo "Exact preserved APK launch and tab smoke test passed with process $PID"

      - name: Upload launch-tested APK
        uses: actions/upload-artifact@v4
        with:
          name: BioSonify-Scalar-SideBySide-LAUNCH-TESTED
          path: |
            candidate/BioSonify-Scalar-SideBySide-OneClick.apk
            candidate/BioSonify-Scalar-SideBySide-OneClick-SHA256.txt
            candidate/apk-badging.txt
            candidate/apk-signature.txt
            candidate/apk-files.txt
            candidate/architecture-check.txt
            candidate/universal-release-build.log
            biosonify-scalar-emulator-log.txt
          if-no-files-found: error
          retention-days: 30

      - name: Upload smoke diagnostics if test fails
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: BioSonify-Scalar-Smoke-Diagnostics
          path: |
            biosonify-scalar-emulator-log.txt
            window.xml
          if-no-files-found: ignore
          retention-days: 7
