name: Final Launch-Test BioSonify Scalar APK

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/build-biosonify-v27-native.yml
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  final-launch-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 40
    env:
      APP_PACKAGE: com.vhanma.biosonify.scalarparallax
      MAIN_COMPONENT: com.vhanma.biosonify.scalarparallax/.MainActivity
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      PATH: /usr/local/lib/android/sdk/platform-tools:/usr/local/lib/android/sdk/emulator:/usr/local/lib/android/sdk/cmdline-tools/latest/bin:/usr/bin:/bin

    steps:
      - name: Download preserved APK
        uses: actions/download-artifact@v4
        with:
          name: BioSonify-Scalar-Candidate
          path: candidate
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: VHanma/biosonify-scalarmorphix
          run-id: 30052907225

      - name: Verify preserved APK
        shell: bash
        run: |
          set -euo pipefail
          cd candidate
          sha256sum -c BioSonify-Scalar-SideBySide-OneClick-SHA256.txt

      - name: Install emulator image
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "emulator" "system-images;android-34;google_apis;x86_64"

      - name: Boot Android
        shell: bash
        run: |
          set -euo pipefail
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo chmod 666 /dev/kvm

          echo no | avdmanager create avd --force --name biosonify_test \
            --package "system-images;android-34;google_apis;x86_64" --device "pixel_6"

          emulator -avd biosonify_test -no-window -noaudio -no-boot-anim \
            -no-snapshot -gpu swiftshader_indirect -camera-back none -camera-front none \
            -memory 3072 > emulator-console.log 2>&1 &

          adb wait-for-device
          for i in $(seq 1 120); do
            [ "$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')" = "1" ] && break
            sleep 5
          done
          test "$(adb shell getprop sys.boot_completed | tr -d '\r')" = "1"
          adb shell input keyevent 82 || true
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0

      - name: Install, launch, and navigate exact APK
        shell: bash
        run: |
          set +e
          APK="candidate/BioSonify-Scalar-SideBySide-OneClick.apk"

          adb install -r "$APK" > install-result.txt 2>&1
          INSTALL_CODE=$?
          adb shell cmd package resolve-activity --brief \
            -a android.intent.action.MAIN \
            -c android.intent.category.LAUNCHER \
            "$APP_PACKAGE" > resolved-activity.txt 2>&1

          adb shell am force-stop "$APP_PACKAGE"
          adb logcat -c
          adb shell am start -W -S -n "$MAIN_COMPONENT" > activity-start-result.txt 2>&1
          START_CODE=$?
          sleep 20

          adb shell pidof "$APP_PACKAGE" > process-id.txt 2>&1
          adb shell dumpsys activity activities > activity-state.txt 2>&1
          adb logcat -d -v threadtime > biosonify-scalar-emulator-log.txt 2>&1
          adb exec-out screencap -p > biosonify-scalar-launch.png 2>/dev/null

          echo "INSTALL_CODE=$INSTALL_CODE" | tee launch-status.txt
          echo "START_CODE=$START_CODE" | tee -a launch-status.txt
          echo "PID=$(cat process-id.txt | tr -d '\r')" | tee -a launch-status.txt
          cat resolved-activity.txt
          cat activity-start-result.txt

          FAILED=0
          [ "$INSTALL_CODE" -eq 0 ] || FAILED=1
          [ "$START_CODE" -eq 0 ] || FAILED=1
          [ -s process-id.txt ] || FAILED=1
          grep -E "mResumedActivity|topResumedActivity" activity-state.txt | grep "$APP_PACKAGE" || FAILED=1
          grep -E "FATAL EXCEPTION|Unable to start activity|Process: ${APP_PACKAGE}" biosonify-scalar-emulator-log.txt && FAILED=1
          grep -E "ReactNativeJS:.*(TypeError|ReferenceError|Invariant Violation|Error:)" biosonify-scalar-emulator-log.txt && FAILED=1

          if [ "$FAILED" -ne 0 ]; then
            echo "Startup failed; printing app-related log" >&2
            grep -E -A 100 -B 30 "FATAL EXCEPTION|AndroidRuntime|ReactNativeJS|SoLoader|UnsatisfiedLinkError|Unable to start activity|${APP_PACKAGE}" biosonify-scalar-emulator-log.txt || true
            exit 1
          fi

          SIZE="$(adb shell wm size | tail -1 | grep -oE '[0-9]+x[0-9]+')"
          WIDTH="${SIZE%x*}"
          HEIGHT="${SIZE#*x}"
          Y=$((HEIGHT - 120))
          for PERCENT in 37 62 87 12; do
            X=$((WIDTH * PERCENT / 100))
            adb shell input tap "$X" "$Y"
            sleep 4
            test -n "$(adb shell pidof "$APP_PACKAGE" | tr -d '\r')" || exit 1
          done

          adb logcat -d -v threadtime > biosonify-scalar-navigation-log.txt 2>&1
          adb exec-out screencap -p > biosonify-scalar-after-navigation.png 2>/dev/null
          grep -E "FATAL EXCEPTION|Unable to start activity|Process: ${APP_PACKAGE}" biosonify-scalar-navigation-log.txt && exit 1
          echo "Exact APK launch and navigation passed"

      - name: Upload launch-tested APK
        uses: actions/upload-artifact@v4
        with:
          name: BioSonify-Scalar-SideBySide-LAUNCH-TESTED
          path: |
            candidate/BioSonify-Scalar-SideBySide-OneClick.apk
            candidate/BioSonify-Scalar-SideBySide-OneClick-SHA256.txt
            candidate/apk-badging.txt
            candidate/apk-signature.txt
            candidate/apk-files.txt
            candidate/architecture-check.txt
            candidate/universal-release-build.log
            biosonify-scalar-emulator-log.txt
            biosonify-scalar-navigation-log.txt
            biosonify-scalar-launch.png
            biosonify-scalar-after-navigation.png
            activity-start-result.txt
            activity-state.txt
            launch-status.txt
            process-id.txt
          if-no-files-found: error
          retention-days: 30

      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: BioSonify-Scalar-Final-Diagnostics
          path: |
            emulator-console.log
            install-result.txt
            resolved-activity.txt
            activity-start-result.txt
            activity-state.txt
            biosonify-scalar-emulator-log.txt
            biosonify-scalar-navigation-log.txt
            biosonify-scalar-launch.png
            launch-status.txt
            process-id.txt
          if-no-files-found: ignore
          retention-days: 7
