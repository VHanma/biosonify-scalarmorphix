name: Build and Smoke-Test BioSonify Scalar APK

on:
  pull_request:
    branches:
      - main
    paths:
      - app/**
      - assets/**
      - components/**
      - constants/**
      - hooks/**
      - lib/**
      - scripts/**
      - app.config.ts
      - babel.config.js
      - metro.config.js
      - package.json
      - pnpm-lock.yaml
      - tsconfig.json
      - .github/workflows/build-biosonify-v27-native.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CI: '1'
      EXPO_NO_TELEMETRY: '1'
      NODE_OPTIONS: '--max-old-space-size=6144'
      APP_PACKAGE: com.vhanma.biosonify.scalarparallax

    steps:
      - name: Check out BioSonify Scalar source
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.12.0'
          run_install: false

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install project dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate native Android project
        run: pnpm exec expo prebuild --platform android --clean

      - name: Confirm side-by-side package identity and ABIs
        run: |
          grep -R "applicationId.*${APP_PACKAGE}" android/app/build.gradle
          grep -R "namespace.*${APP_PACKAGE}" android/app/build.gradle
          grep '^reactNativeArchitectures=' android/gradle.properties | tee architecture-check.txt
          grep 'arm64-v8a' architecture-check.txt
          grep 'x86_64' architecture-check.txt

      - name: Build exact universal standalone release APK
        working-directory: android
        shell: bash
        run: |
          set -o pipefail
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon --stacktrace 2>&1 | tee ../universal-release-build.log

      - name: Verify package name, launcher name, signature and ABIs
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk BioSonify-Scalar-SideBySide-OneClick.apk
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -1)"
          AAPT="$(find "$ANDROID_HOME/build-tools" -name aapt -type f | sort -V | tail -1)"
          "$APKSIGNER" verify --verbose --print-certs BioSonify-Scalar-SideBySide-OneClick.apk | tee apk-signature.txt
          "$AAPT" dump badging BioSonify-Scalar-SideBySide-OneClick.apk | tee apk-badging.txt
          unzip -l BioSonify-Scalar-SideBySide-OneClick.apk | tee apk-files.txt
          grep "package: name='${APP_PACKAGE}'" apk-badging.txt
          grep "application-label:'BioSonify Scalar'" apk-badging.txt
          grep 'lib/arm64-v8a/' apk-files.txt
          grep 'lib/x86_64/' apk-files.txt
          sha256sum BioSonify-Scalar-SideBySide-OneClick.apk > BioSonify-Scalar-SideBySide-OneClick-SHA256.txt

      - name: Preserve verified candidate APK
        uses: actions/upload-artifact@v4
        with:
          name: BioSonify-Scalar-Candidate
          path: |
            BioSonify-Scalar-SideBySide-OneClick.apk
            BioSonify-Scalar-SideBySide-OneClick-SHA256.txt
            apk-badging.txt
            apk-signature.txt
            apk-files.txt
            architecture-check.txt
            universal-release-build.log
          if-no-files-found: error
          retention-days: 7

      - name: Boot stable Android emulator and test exact APK
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_6
          cores: 2
          ram-size: 4096M
          heap-size: 1024M
          disk-size: 6G
          disable-animations: true
          emulator-boot-timeout: 900
          script: |
            set -euo pipefail
            adb install -r BioSonify-Scalar-SideBySide-OneClick.apk
            adb logcat -c
            adb shell monkey -p "$APP_PACKAGE" -c android.intent.category.LAUNCHER 1
            sleep 15
            PID="$(adb shell pidof "$APP_PACKAGE" | tr -d '\r')"
            test -n "$PID"
            adb shell dumpsys activity activities | grep -E "mResumedActivity|topResumedActivity" | grep "$APP_PACKAGE"

            python3 - <<'PY'
            import re
            import subprocess
            import time
            import xml.etree.ElementTree as ET

            package = "com.vhanma.biosonify.scalarparallax"
            labels = ["Frequencies", "Brain", "Theory", "Sonify"]

            for label in labels:
                subprocess.run(["adb", "shell", "uiautomator", "dump", "/sdcard/window.xml"], check=True, stdout=subprocess.DEVNULL)
                subprocess.run(["adb", "pull", "/sdcard/window.xml", "window.xml"], check=True, stdout=subprocess.DEVNULL)
                root = ET.parse("window.xml").getroot()
                node = next((n for n in root.iter() if n.attrib.get("text") == label or n.attrib.get("content-desc") == label), None)
                if node is None:
                    raise SystemExit(f"Could not find tab: {label}")
                match = re.fullmatch(r"\[(\d+),(\d+)\]\[(\d+),(\d+)\]", node.attrib["bounds"])
                if not match:
                    raise SystemExit(f"Bad bounds for {label}: {node.attrib.get('bounds')}")
                x1, y1, x2, y2 = map(int, match.groups())
                subprocess.run(["adb", "shell", "input", "tap", str((x1 + x2) // 2), str((y1 + y2) // 2)], check=True)
                time.sleep(3)
                pid = subprocess.check_output(["adb", "shell", "pidof", package], text=True).strip()
                if not pid:
                    raise SystemExit(f"App process died after opening {label}")
                print(f"Tab passed: {label}; process {pid}")
            PY

            adb logcat -d -v threadtime > biosonify-scalar-emulator-log.txt
            if grep -E "FATAL EXCEPTION|Unable to start activity|Process: ${APP_PACKAGE}" biosonify-scalar-emulator-log.txt; then
              echo "Fatal Android runtime error detected"
              exit 1
            fi
            if grep -E "ReactNativeJS:.*(TypeError|ReferenceError|Invariant Violation|Error:)" biosonify-scalar-emulator-log.txt; then
              echo "Fatal React Native JavaScript error detected"
              exit 1
            fi
            echo "Exact APK launch and tab smoke test passed with process $PID"

      - name: Upload verified side-by-side APK
        uses: actions/upload-artifact@v4
        with:
          name: BioSonify-Scalar-SideBySide-Verified
          path: |
            BioSonify-Scalar-SideBySide-OneClick.apk
            BioSonify-Scalar-SideBySide-OneClick-SHA256.txt
            apk-badging.txt
            apk-signature.txt
            apk-files.txt
            architecture-check.txt
            universal-release-build.log
            biosonify-scalar-emulator-log.txt
          if-no-files-found: error
          retention-days: 30

      - name: Upload diagnostics if anything fails
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: BioSonify-Scalar-Failure-Diagnostics
          path: |
            universal-release-build.log
            apk-badging.txt
            apk-signature.txt
            apk-files.txt
            architecture-check.txt
            biosonify-scalar-emulator-log.txt
          if-no-files-found: ignore
          retention-days: 7
