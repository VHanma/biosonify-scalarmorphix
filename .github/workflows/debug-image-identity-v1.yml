name: Diagnose Original Image Identity Chunks

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/debug-image-identity-v1.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Inspect original chunks
        shell: bash
        run: |
          set +e
          {
            echo "V1 CHUNK LIST"
            find build_inputs -maxdepth 1 -name 'image-identity-v1.b64.part*' -print | sort
            echo "V1 CHUNK COUNT"
            find build_inputs -maxdepth 1 -name 'image-identity-v1.b64.part*' | wc -l
            for f in $(find build_inputs -maxdepth 1 -name 'image-identity-v1.b64.part*' -print | sort); do
              printf '%s bytes=' "$f"
              wc -c < "$f" | tr -d '\n'
              printf ' sha256='
              sha256sum "$f" | cut -d' ' -f1
              printf ' first8='
              head -c 8 "$f"; echo
              printf ' last8='
              tail -c 8 "$f"; echo
            done
            cat $(find build_inputs -maxdepth 1 -name 'image-identity-v1.b64.part*' -print | sort) > image-identity-v1-overlay.b64
            echo "COMBINED BYTES $(wc -c < image-identity-v1-overlay.b64)"
            echo "COMBINED SHA256 $(sha256sum image-identity-v1-overlay.b64 | cut -d' ' -f1)"
            base64 -d image-identity-v1-overlay.b64 > image-identity-v1-overlay.zip 2>base64-v1-error.txt
            echo "BASE64 EXIT $?"
            cat base64-v1-error.txt
            echo "ZIP BYTES $(wc -c < image-identity-v1-overlay.zip)"
            echo "ZIP SHA256 $(sha256sum image-identity-v1-overlay.zip | cut -d' ' -f1)"
            unzip -t image-identity-v1-overlay.zip > unzip-v1-test.txt 2>&1
            echo "UNZIP EXIT $?"
            cat unzip-v1-test.txt
          } | tee source-v1-diagnostic.txt
          exit 0
      - name: Upload original source diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: Image-Identity-V1-Source-Diagnostics
          path: |
            source-v1-diagnostic.txt
            base64-v1-error.txt
            unzip-v1-test.txt
            image-identity-v1-overlay.b64
            image-identity-v1-overlay.zip
          if-no-files-found: error
          retention-days: 7
