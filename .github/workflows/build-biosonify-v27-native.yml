name: Build BioSonify Fixed Android APK

on:
  push:
    branches:
      - main
    paths:
      - app/**
      - assets/**
      - components/**
      - constants/**
      - hooks/**
      - lib/**
      - scripts/**
      - app.config.ts
      - babel.config.js
      - metro.config.js
      - package.json
      - pnpm-lock.yaml
      - tsconfig.json
      - build_inputs/BioSonify-FIXED-TRIGGER.txt
      - .github/workflows/build-biosonify-v27-native.yml
  pull_request:
    branches:
      - main
    paths:
      - app/**
      - assets/**
      - components/**
      - constants/**
      - hooks/**
      - lib/**
      - scripts/**
      - app.config.ts
      - babel.config.js
      - metro.config.js
      - package.json
      - pnpm-lock.yaml
      - tsconfig.json
      - build_inputs/BioSonify-FIXED-TRIGGER.txt
      - .github/workflows/build-biosonify-v27-native.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: '1'
      EXPO_NO_TELEMETRY: '1'
      NODE_OPTIONS: '--max-old-space-size=6144'

    steps:
      - name: Check out real BioSonify source
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.12.0'
          run_install: false

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install project dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate native Android project
        run: pnpm exec expo prebuild --platform android --clean

      - name: Build installable debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Name and hash finished APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk BioSonify-FIXED-OneClick.apk
          sha256sum BioSonify-FIXED-OneClick.apk > BioSonify-FIXED-OneClick-SHA256.txt

      - name: Upload installable fixed APK
        uses: actions/upload-artifact@v4
        with:
          name: BioSonify-FIXED-OneClick
          path: |
            BioSonify-FIXED-OneClick.apk
            BioSonify-FIXED-OneClick-SHA256.txt
          if-no-files-found: error
          retention-days: 30
