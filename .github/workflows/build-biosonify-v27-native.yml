name: Build BioSonify V27 Native APK

on:
  push:
    branches:
      - agent/biosonify-v27-build-safe
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out build branch
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 35 build components
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Restore uploaded Android project
        shell: bash
        run: |
          base64 --decode build_inputs/BioSonify_COMPLETE_V27_ANDROID_PROJECT.zip.b64 > BioSonify_COMPLETE_V27_ANDROID_PROJECT.zip
          unzip -q BioSonify_COMPLETE_V27_ANDROID_PROJECT.zip

      - name: Build debug APK
        shell: bash
        run: |
          set -o pipefail
          cd BioSonifyCloneAndroid
          gradle --no-daemon --stacktrace :app:assembleDebug 2>&1 | tee ../biosonify-build.log

      - name: Name finished APK
        if: success()
        shell: bash
        run: cp BioSonifyCloneAndroid/app/build/outputs/apk/debug/app-debug.apk BioSonify-V27-debug.apk

      - name: Upload installable APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: BioSonify-V27-APK
          path: BioSonify-V27-debug.apk
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BioSonify-V27-build-log
          path: biosonify-build.log
          if-no-files-found: ignore
